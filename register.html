<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福之缘婚恋 - 用户注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <h3>福之缘婚恋</h3>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="match.html">智能匹配</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">个人中心</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">联系我们</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 注册表单 -->
    <section class="py-5 bg-light">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-danger text-white text-center">
                            <h4>用户注册</h4>
                        </div>
                        <div class="card-body p-4">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label class="form-label">性别</label>
                                    <div class="d-flex gap-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="gender" id="male" value="male" checked>
                                            <label class="form-check-label" for="male">男</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                                            <label class="form-check-label" for="female">女</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="username" class="form-label">昵称</label>
                                    <input type="text" class="form-control" id="username" placeholder="请输入昵称" required>
                                </div>
                                <div class="mb-3">
                                    <label for="age" class="form-label">年龄</label>
                                    <input type="number" class="form-control" id="age" min="18" max="80" placeholder="请输入年龄" required>
                                </div>
                                <div class="mb-3">
                                    <label for="phone" class="form-label">手机号码</label>
                                    <input type="tel" class="form-control" id="phone" placeholder="请输入手机号" pattern="^1[3-9]\d{9}$" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">密码</label>
                                    <input type="password" class="form-control" id="password" placeholder="请输入6-16位密码" minlength="6" maxlength="16" required>
                                </div>
                                <div class="mb-3">
                                    <label for="confirmPwd" class="form-label">确认密码</label>
                                    <input type="password" class="form-control" id="confirmPwd" placeholder="请再次输入密码" minlength="6" maxlength="16" required>
                                </div>
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="agree" required>
                                    <label class="form-check-label" for="agree">我已阅读并同意《福之缘用户协议》和《隐私政策》</label>
                                </div>
                                <button type="submit" class="btn btn-danger w-100">注册</button>
                                <div class="text-center mt-3">
                                    <a href="login.html" class="text-danger">已有账号？立即登录</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部 -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>福之缘婚恋</h5>
                    <p class="text-muted small">© 2025 福之缘婚恋 版权所有 | 婚恋服务许可证：XX123456</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-muted small">客服电话：400-888-9999</p>
                    <p class="text-muted small">客服邮箱：service@fuzhiyuan.com</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script>
        // 注册表单验证
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            const confirmPwd = document.getElementById('confirmPwd').value;
            
            if (pwd !== confirmPwd) {
                alert('两次输入的密码不一致，请重新输入！');
                return;
            }
            
            // 模拟注册成功
            alert('注册成功！即将跳转到登录页');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
